<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedChat | Мобильная версия</title>
    <link rel="icon" type="image/png" href="icom.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* ОКНО ВХОДА */
        #auth { position: fixed; width: 100%; height: 100%; background: #0e1621; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #17212b; padding: 25px; border-radius: 12px; width: 280px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #080e15; display: flex; flex-direction: column; transition: 0.3s; flex-shrink: 0; }
        
        /* ОСНОВНОЙ ЧАТ */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0e1621; position: relative; transition: 0.3s; }
        
        /* КНОПКА НАЗАД (ДЛЯ МОБИЛОК) */
        #back-btn { display: none; background: none; border: none; color: #5288c1; font-size: 24px; cursor: pointer; padding: 0 15px 0 0; }

        #chat-header { background: #17212b; padding: 12px 20px; font-weight: bold; color: #5288c1; border-bottom: 1px solid #080e15; display: flex; align-items: center; justify-content: space-between; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { background: #182533; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; max-width: 85%; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #2b5278; }

        input { background: #242f3d; color: white; border: none; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #5288c1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* АДАПТАЦИЯ ПОД АНДРОИД (MOBILE) */
        @media (max-width: 700px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            .main-chat { width: 100%; position: absolute; left: 100%; height: 100%; z-index: 20; }
            body.chat-active .main-chat { left: 0; }
            #back-btn { display: block; }
        }

        .chat-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #0e1621; display: flex; align-items: center; }
        .chat-item:active { background: #242f3d; }
    </style>
</head>
<body id="app-body">

<div id="auth">
    <div class="auth-card">
        <img src="icom.png" width="60">
        <h2 style="color:#5288c1; margin: 10px 0;">SpeedChat</h2>
        <input type="text" id="reg-name" placeholder="Имя" style="width:85%; margin-bottom:5px;">
        <input type="text" id="myIdInput" placeholder="@id" style="width:85%; margin-bottom:5px;">
        <input type="password" id="reg-pass" placeholder="Пароль" style="width:85%;">
        <button onclick="handleAuth()" style="width:95%; margin-top:15px; padding:12px;">ВОЙТИ / РЕГА</button>
    </div>
</div>

<div class="sidebar">
    <div style="padding: 15px; border-bottom: 1px solid #080e15; display:flex;">
        <input type="text" id="searchInput" placeholder="Поиск @id..." style="flex:1; font-size:12px;">
        <button onclick="addContact()" style="margin-left:5px; padding:0 15px;">+</button>
    </div>
    <div id="contacts-list" style="overflow-y:auto;"></div>
</div>

<div class="main-chat">
    <div id="chat-header">
        <div style="display:flex; align-items:center;">
            <button id="back-btn" onclick="closeChat()">⬅</button>
            <span id="chat-title">ВЫБЕРИТЕ ЧАТ</span>
        </div>
        <button onclick="clearChat()" style="background:#ff4d4d; font-size:10px; padding:5px 10px;">ОЧИСТИТЬ</button>
    </div>
    <div id="messages"></div>
    <div style="background:#17212b; padding:15px; display:flex; align-items:center;">
        <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1;">
        <button onclick="sendMessage()" style="background:none; color:#5288c1; font-size:26px; margin-left:10px; padding:0;">📤</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://speedchat-3412e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentChat = null, myId = "", myName = "";

    async function handleAuth() {
        const nI = document.getElementById('reg-name').value.trim();
        const iI = document.getElementById('myIdInput').value.toLowerCase().replace('@','').trim();
        const ps = document.getElementById('reg-pass').value;

        if(!iI || !ps) return alert("Заполни @id и пароль!");

        const s = await db.ref('users/' + iI).once('value');
        if (s.exists()) {
            if (s.val().pass === ps) { myId = iI; myName = s.val().name; loginSuccess(); }
            else alert("Неверный пароль!");
        } else {
            await db.ref('users/' + iI).set({ name: nI, pass: ps });
            myId = iI; myName = nI; loginSuccess();
        }
    }

    function loginSuccess() {
        document.getElementById('auth').style.display = 'none';
        loadContacts();
    }

    function addContact() {
        let q = document.getElementById('searchInput').value.trim().toLowerCase().replace('@','');
        if(q && q !== myId) db.ref('users/' + myId + '/contacts/' + q).set(true);
    }

    function loadContacts() {
        db.ref('users/' + myId + '/contacts').on('value', snap => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            addUI(myId, myName + " (Заметки)");
            snap.forEach(c => {
                const id = c.key;
                db.ref('users/' + id + '/name').once('value', s => {
                    addUI(id, (s.val() || id) + " (@" + id + ")");
                });
            });
        });
    }

    function addUI(id, label) {
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = `<img src="icom.png" width="25" style="margin-right:10px;"> ${label}`;
        div.onclick = () => {
            currentChat = id;
            document.getElementById('chat-title').innerText = label;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('app-body').classList.add('chat-active');
            loadMessages();
        };
        document.getElementById('contacts-list').appendChild(div);
    }

    function closeChat() { document.getElementById('app-body').classList.remove('chat-active'); }

    function sendMessage() {
        const i = document.getElementById('msgInput');
        if(i.value.trim() && currentChat) {
            const cID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
            db.ref('chats/' + cID).push({ user: myId, text: i.value.trim() });
            i.value = '';
        }
    }

    function loadMessages() {
        const cID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
        db.ref('chats/' + cID).off();
        db.ref('chats/' + cID).on('child_added', s => {
            const d = s.val();
            const m = document.createElement('div');
            m.className = d.user === myId ? 'msg my-msg' : 'msg';
            m.innerText = d.text;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    function clearChat() {
        if (currentChat && confirm("Удалить переписку?")) {
            const cID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
            db.ref('chats/' + cID).remove();
            document.getElementById('messages').innerHTML = '';
        }
    }
</script>
</body>
</html>
